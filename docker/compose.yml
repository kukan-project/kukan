name: kukan

x-postgres-credentials: &postgres-credentials
  POSTGRES_DB: kukan
  POSTGRES_USER: kukan
  POSTGRES_PASSWORD: kukan

x-minio-credentials: &minio-credentials
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin

services:
  postgres:
    image: postgres:16-alpine
    container_name: kukan-postgres
    ports:
      - '5432:5432'
    environment:
      <<: *postgres-credentials
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kukan-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      <<: *minio-credentials
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: kukan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *minio-credentials
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/kukan-dev;
      mc anonymous set download local/kukan-dev;
      cat > /tmp/cors.json << 'CORS'
      {
        \"Rules\": [
          {
            \"AllowedOrigins\": [\"http://localhost:3000\"],
            \"AllowedMethods\": [\"GET\", \"PUT\", \"HEAD\"],
            \"AllowedHeaders\": [\"*\"],
            \"ExposeHeaders\": [\"ETag\", \"Content-Length\"],
            \"MaxAgeSeconds\": 3600
          }
        ]
      }
      CORS
      mc cors set local/kukan-dev /tmp/cors.json;
      "

  opensearch:
    image: opensearchproject/opensearch:3
    container_name: kukan-opensearch
    profiles: ['search']
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: kukan-opensearch-dashboards
    profiles: ['search']
    ports:
      - '5601:5601'
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  opensearch-data:
