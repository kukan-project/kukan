name: Bug Report / バグ報告
description: Report a bug or unexpected behavior / バグや予期しない動作を報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below.
        バグ報告ありがとうございます！以下の項目にご記入ください。
  - type: textarea
    id: description
    attributes:
      label: Description / 説明
      description: A clear description of the bug / バグの明確な説明
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 再現手順
      description: Steps to reproduce the behavior / 再現手順を記載してください
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期待される動作
      description: What you expected to happen / 期待される動作を記載してください
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 実際の動作
      description: What actually happened / 実際に起きた動作を記載してください
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: KUKAN Version / バージョン
      description: KUKAN version or commit hash / バージョンまたはコミットハッシュ
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment / 環境
      description: |
        OS, Node.js version, browser, deployment type
        OS、Node.js バージョン、ブラウザ、デプロイ方式
      placeholder: |
        - OS: Ubuntu 24.04 / Windows 11 (WSL2)
        - Node.js: 24.x
        - Browser: Chrome 130
        - Deploy: Docker Compose
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 追加情報
      description: Screenshots, logs, or other relevant information / スクリーンショット、ログ等
    validations:
      required: false
