name: kukan

x-minio-credentials: &minio-credentials
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

# ---------- Shared app environment (prod profile) ----------
x-app-environment: &app-environment
  NODE_ENV: production
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-kukan}
  POSTGRES_USER: ${POSTGRES_USER:-kukan}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kukan}
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-kukan-dev}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
  SEARCH_TYPE: ${SEARCH_TYPE:-opensearch}
  OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
  SQS_ENDPOINT: ${SQS_ENDPOINT:-http://elasticmq:9324}
  SQS_QUEUE_URL: ${SQS_QUEUE_URL:-http://elasticmq:9324/000000000000/kukan-pipeline}
  SQS_ACCESS_KEY: ${SQS_ACCESS_KEY:-x}
  SQS_SECRET_KEY: ${SQS_SECRET_KEY:-x}
  AI_TYPE: ${AI_TYPE:-none}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}

services:
  # ===== Infrastructure (always started) =====

  postgres:
    image: postgres:16-alpine
    container_name: kukan-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kukan}
      POSTGRES_USER: ${POSTGRES_USER:-kukan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kukan}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kukan-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      <<: *minio-credentials
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: kukan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *minio-credentials
      S3_BUCKET: ${S3_BUCKET:-kukan-dev}
      CORS_ORIGIN: ${BETTER_AUTH_URL:-http://localhost:3000}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        printf '<CORSConfiguration><CORSRule><AllowedOrigin>%s</AllowedOrigin><AllowedMethod>PUT</AllowedMethod><AllowedHeader>*</AllowedHeader><ExposeHeader>ETag</ExposeHeader><MaxAgeSeconds>3600</MaxAgeSeconds></CORSRule></CORSConfiguration>' "$$CORS_ORIGIN" > /tmp/cors.xml
        mc cors set "local/$$S3_BUCKET" /tmp/cors.xml

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: kukan-elasticmq
    ports:
      - '9324:9324'
      - '9325:9325'
    volumes:
      - ./docker/elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9325 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    build:
      context: ./docker
      dockerfile: opensearch.Dockerfile
    image: kukan-opensearch:3
    container_name: kukan-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - '9200:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: kukan-opensearch-dashboards
    ports:
      - '5601:5601'
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

  # ===== Production stack (--profile prod) =====

  web:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: kukan-web:latest
    container_name: kukan-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
    environment:
      <<: *app-environment
      PORT: '3000'
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: kukan-worker:latest
    container_name: kukan-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
    environment:
      <<: *app-environment
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  caddy:
    profiles: [prod]
    image: caddy:2-alpine
    container_name: kukan-caddy
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  opensearch-data:
  caddy-data:
  caddy-config:
